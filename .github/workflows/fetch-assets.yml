name: Fetch assets -> vidgen

# Runs in the PUBLIC studio repo (CI has internet). Vendors CC0/MIT/ISC assets
# and commits them into the PRIVATE vidgen content repo so renders are fully
# offline/deterministic and no asset is fetched at render time.
#
# Required repo secrets (already used by ci.py):
#   CONTENT_REPO   e.g. "your-org/vidgen"   (the private repo)
#   CONTENT_TOKEN  a PAT / fine-grained token with contents:write on CONTENT_REPO

on:
  workflow_dispatch:
    inputs:
      packs:
        description: 'Packs to sync ("all" or comma list: lucide,tabler,open-doodles)'
        default: 'all'
        required: true
      push:
        description: 'Commit + push results to the vidgen repo'
        type: boolean
        default: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout studio (this repo — holds the fetch script)
        uses: actions/checkout@v4

      - name: Checkout vidgen (private content repo)
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.CONTENT_REPO }}
          token: ${{ secrets.CONTENT_TOKEN }}
          path: vidgen

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch + normalize assets into vidgen
        run: node scripts/fetch-assets.mjs --repo vidgen --packs "${{ github.event.inputs.packs }}"

      - name: Show what changed
        working-directory: vidgen
        run: |
          git status --porcelain assets src/assets-manifest.json ASSETS-LICENSES.md
          echo "---- manifest ----"
          cat src/assets-manifest.json | head -60

      - name: Commit + push to vidgen
        if: ${{ github.event.inputs.push == 'true' }}
        working-directory: vidgen
        run: |
          git config user.name "asset-bot"
          git config user.email "asset-bot@users.noreply.github.com"
          git add assets src/assets-manifest.json ASSETS-LICENSES.md
          if git diff --cached --quiet; then
            echo "No asset changes to commit."
          else
            git commit -m "chore(assets): sync CC0/MIT/ISC assets [skip ci]"
            git push
          fi

      - name: Upload assets artifact (for review / when push=false)
        uses: actions/upload-artifact@v4
        with:
          name: vidgen-assets
          path: |
            vidgen/assets/**
            vidgen/src/assets-manifest.json
            vidgen/ASSETS-LICENSES.md
          if-no-files-found: warn
